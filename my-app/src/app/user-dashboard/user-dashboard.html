<div class="layout" [class.dark]="isDarkMode">
  <aside class="sidebar">
    <div class="brand-logo">✨ LabourConnect</div>
    <nav class="nav-menu">
      <a routerLink="." routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">🏠 Dashboard</a>
      <a routerLink="search" routerLinkActive="active">🔍 Find Worker</a>
      <a routerLink="bookings" routerLinkActive="active">📅 My Bookings</a>
      <a routerLink="settings" routerLinkActive="active">⚙️ Settings</a>
      <a routerLink="payments" routerLinkActive="active">💳 Payment Methods</a>
    </nav>
  </aside>

  <div class="main-wrapper">
    <header class="navbar">
      <h2>Welcome back! 👋</h2>
      <div class="profile-menu">
        <button class="btn-theme" (click)="toggleTheme()">
          {{ isDarkMode ? '☀️ Light' : '🌙 Dark' }}
        </button>
        <button class="btn-logout" (click)="logout()">Logout</button>
      </div>
    </header>

    <main class="content-area">
      <div class="content-container">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</div>
